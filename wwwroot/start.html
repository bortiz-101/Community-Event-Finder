<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Search Events</title>

    <style>
        body {
            font-family: Arial;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f5f7fa;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,.1);
            width: 320px;
        }

        input, select, button {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
        }

        button {
            background: #0078d7;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="box">

        <h2>Find Events</h2>

        <input id="addr"
               value="1032 W Sheridan Rd, Chicago, IL"
               placeholder="Enter address">

        <select id="cat">
            <option value="">All categories</option>
            <option>Music and theather</option>
            <option>Game, party and social</option>
            <option>Sports</option>
            <option>Food</option>
            <option>Health</option>
            <option>Study</option>
            <option>Arts</option>
            <option>Business</option>
            <option>Festival</option>
            <option>Community</option>
            <option>Career</option>
            <option>Volunteer</option>
            <option>Family</option>
            <option>Other</option>
        </select>

        <select id="radius">
            <option value="">Any distance</option>
            <option value="5">5 miles</option>
            <option value="10">10 miles</option>
            <option value="20">20 miles</option>
        </select>

        <button onclick="go()">Search</button>

    </div>

    <script>
        function go() {
            const a = addr.value.trim();
            const c = cat.value;
            const r = radius.value;

            let url = "/index.html?";

            if (a) url += "addr=" + encodeURIComponent(a) + "&";
            if (c) url += "cat=" + encodeURIComponent(c) + "&";
            if (r) url += "radius=" + r;

            location.href = url;
        }
    </script>

</body>
</html>
